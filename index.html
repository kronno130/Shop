<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0a0a0a; color: #ff0000; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .btn { background: #ff0000; color: white; border: none; padding: 15px 30px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; margin: 10px 0; box-shadow: 0 0 15px #ff0000; }
        .card { border: 1px solid #333; padding: 15px; border-radius: 10px; background: #111; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h2 style="text-shadow: 0 0 10px #ff0000;">REDMAGIC VOIP HUB</h2>
    <div class="card">
        <p>TELEGRAM ITALY 🇮🇹</p>
        <p>Prezzo: 0.05 LTC</p>
        <button class="btn" onclick="buy('tg_it')">ACQUISTA ORA</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function buy(prod) { tg.sendData(prod); tg.close(); }
    </script>
</body>
</html>
