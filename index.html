<!DOCTYPE html>
<html lang="it">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocioShop Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0d0d0d; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; padding: 20px; text-align: center; }
        .product-card { border: 1px solid #00ff41; border-radius: 10px; padding: 15px; margin-bottom: 20px; background: #1a1a1a; box-shadow: 0 0 10px #00ff41; }
        .btn-buy { background-color: #00ff41; color: #000; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; }
        h1 { font-size: 1.5rem; text-shadow: 2px 2px #ff003c; }
    </style>
</head>
<body>
    <h1>⚡ KRONNO STCOK SHOP ⚡</h1>
    <div id="catalog"> 
       <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); // Comunica a Telegram che la app è pronta

        document.addEventListener('DOMContentLoaded', function() {
            const bottone = document.querySelector('.btn-buy');
            
            if (bottone) {
                bottone.addEventListener('click', function() {
                    tg.showPopup({
                        title: 'Pagamento LTC',
                        message: 'Invia 2.00€ in LTC a:\n\nLXAnkccgxDBi8m3LtEXGuA8TnPynuceC2Q',
                        buttons: [
                            {id: 'copy', type: 'default', text: 'Copia Indirizzo'},
                            {id: 'close', type: 'cancel', text: 'Chiudi'}
                        ]
                    }, function(buttonId) {
                        if (buttonId === 'copy') {
                            const el = document.createElement('textarea');
                            el.value = "LXAnkccgxDBi8m3LtEXGuA8TnPynuceC2Q";
                            document.body.appendChild(el);
                            el.select();
                            document.execCommand('copy');
                            document.body.removeChild(el);
                            tg.showAlert("Indirizzo copiato!");
                        }
                    });
                });
            } else {
                alert("Errore: Il codice non trova il pulsante .btn-buy");
            }
        });
    </script>
</body>
</html>
        <div class="product-card">
            <h3>Account PVA</h3>
            <p>Disponibili: <span id="stock-count">Caricamento...</span></p>
            <p>Prezzo: 2.00€ (LTC)</p>
            <button class="btn-buy" onclick="buyProduct('pva')">ACQUISTA ORA</button>
        </div>
    </div>

   <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function buyProduct(id) {
        const indirizzoLTC = "LXAnkccgxDBi8m3LtEXGuA8TnPynuceC2Q";
        
        // Usiamo il popup nativo che funziona SEMPRE
        tg.showPopup({
            title: 'Pagamento Account PVA',
            message: 'Invia 2.00€ in LTC a questo indirizzo:\n\n' + indirizzoLTC,
            buttons: [
                {id: 'copy', type: 'default', text: 'Copia Indirizzo'},
                {id: 'close', type: 'cancel', text: 'Chiudi'}
            ]
        }, function(buttonId) {
            if (buttonId === 'copy') {
                // Questo copia l'indirizzo negli appunti
                const el = document.createElement('textarea');
                el.value = indirizzoLTC;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                tg.showAlert("Indirizzo copiato! Procedi pure con il pagamento.");
            }
        });
    }
</script>
