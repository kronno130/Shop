<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #ff0000; font-family: sans-serif; text-align: center; }
        .card { border: 1px solid #333; padding: 20px; margin: 10px; border-radius: 15px; background: #111; }
        .btn { background: #ff0000; color: #fff; padding: 10px 20px; border: none; border-radius: 5px; width: 80%; }
        .price { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>
    <h1>REDMAGIC VOIP</h1>
    <div class="card">
        <h3>WhatsApp (Global)</h3>
        <p class="price">0.50 LTC</p>
        <button class="btn" onclick="buy('whatsapp')">ACQUISTA ORA</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function buy(service) {
            tg.sendData(JSON.stringify({service: service, action: 'pay'}));
            tg.close();
        }
    </script>
</body>
</html>
